services:
  mcp-skill-service:
    container_name: mcp-skill-service
    build:
      context: ..
      dockerfile: mcp-server/Dockerfile
    image: lightrag-mcp-skill-service:latest
    command: ["python", "/app/server.py"]
    stdin_open: true
    tty: false
    environment:
      MCP_SKILLS_DIR: /app/skills
      MCP_WORKSPACE_DIR: /workspace
      MCP_RUNS_DIR: /workspace/runs
      MCP_STATE_DIR: /workspace/state
      MCP_ENVS_DIR: /workspace/envs
      MCP_WHEELHOUSE_DIR: /workspace/wheelhouse
      MCP_PIP_CACHE_DIR: /workspace/pip-cache
      MCP_LOCKS_DIR: /workspace/locks
    volumes:
      - mcp_skill_runs:/workspace/runs
      - mcp_skill_state:/workspace/state
      - mcp_skill_envs:/workspace/envs
      - mcp_skill_wheelhouse:/workspace/wheelhouse
      - mcp_skill_pip_cache:/workspace/pip-cache
      - mcp_skill_locks:/workspace/locks
    # Local development hot reload for skill definitions:
    # volumes:
    #   - ../skills:/app/skills:ro
    #
    # Because this server currently uses stdio transport, the most natural
    # local launch mode for an MCP client is:
    #   docker compose -f mcp-server/docker-compose.yml run --rm mcp-skill-service

volumes:
  mcp_skill_runs:
  mcp_skill_state:
  mcp_skill_envs:
  mcp_skill_wheelhouse:
  mcp_skill_pip_cache:
  mcp_skill_locks:
